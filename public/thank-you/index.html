<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <title>Thank You — VITA Host</title>
    <meta name="description" content="Thanks for getting in touch. We will respond within one business day." />
    <link rel="canonical" href="/thank-you/" />
    <link rel="icon" href="/favicon.ico" />
    <style>
        body { margin: 0; }
        .ty-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 60px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .ty-card {
            max-width: 640px;
            text-align: center;
        }
        .ty-mark {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #FFD93D;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 32px;
            color: #111;
        }
        .ty-card h1 {
            font-size: 40px;
            line-height: 1.15;
            margin: 0 0 16px;
            color: #111;
            font-weight: 700;
        }
        .ty-card p {
            font-size: 17px;
            line-height: 1.6;
            color: #555;
            margin: 0 0 32px;
        }
        .ty-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .ty-actions a {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: opacity .2s;
        }
        .ty-actions a:hover { opacity: 0.85; }
        .ty-btn-primary {
            background: #111;
            color: #fff;
        }
        .ty-btn-secondary {
            background: transparent;
            color: #111;
            border: 1px solid #111;
        }
        .ty-meta {
            margin-top: 40px;
            font-size: 14px;
            color: #888;
        }
        .ty-meta a {
            color: #555;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <section class="ty-shell">
        <div class="ty-card">
            <div class="ty-mark">✓</div>
            <h1>Thanks — message received.</h1>
            <p>
                We have your details and will respond within one business day.
                In the meantime, feel free to explore what we do or browse our latest articles.
            </p>
            <div class="ty-actions">
                <a href="/" class="ty-btn-primary">Back to home</a>
                <a href="/blog-airbnb-property-management/" class="ty-btn-secondary">Read the blog</a>
            </div>
            <p class="ty-meta">
                Urgent? Email <a href="mailto:info@vitahost.es">info@vitahost.es</a>
                or call <a href="tel:+34647754589">+34 647 754 589</a>.
            </p>
        </div>
    </section>
</body>
</html>
